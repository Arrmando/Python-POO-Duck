name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

defaults:
  run:
    working-directory: projeto_1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: extractions/setup-just@v2
      - run: uv sync --all-groups
      - run: just lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: extractions/setup-just@v2
      - run: just build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: extractions/setup-just@v2
      - run: uv sync --all-groups
      - run: just test

  ready:
    name: Ready to Ship
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    steps:
      - run: echo "All checks passed"
        working-directory: ${{ github.workspace }}

