name: Report

on:
  workflow_call:

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: projeto_1/docs/relatorio-final/
          latexmk_use_lualatex: true
      - name: Rename PDF
        run: cp projeto_1/docs/relatorio-final/main.pdf projeto_1/relatorio-final.pdf
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-final
          path: projeto_1/relatorio-final.pdf
